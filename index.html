<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCĐ NQ57 — Hệ thống Quản lý Nghị quyết 57</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: sans-serif;
  }
  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  /* Hiển thị loading trong lúc iframe tải */
  .loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 9999;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid #e2e8f0;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .loading p {
    color: #64748b;
    font-family: system-ui, sans-serif;
  }
</style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Đang tải hệ thống...</p>
  </div>
  
  <iframe 
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbx9W_z8IHFo18JrtMwXPtP5Hgph43BFT2mlLXoKzEB6EdHlbos7s9fEwNJRypfXtvcj0Q/exec"
    allow="camera; microphone; clipboard-read; clipboard-write"
    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-scripts allow-modals allow-downloads"
  ></iframe>

  <script>
    var iframe = document.getElementById('appFrame');
    var loadingDiv = document.getElementById('loading');
    
    // Khi iframe tải xong thì ẩn loading
    iframe.onload = function() {
      loadingDiv.style.display = 'none';
    };
    
    // Nếu iframe lỗi hoặc không tải được sau 10 giây
    setTimeout(function() {
      if (loadingDiv.style.display !== 'none') {
        loadingDiv.innerHTML = '<div style="color:#ef4444;">⚠️ Không thể kết nối đến hệ thống. Vui lòng thử lại sau.</div>';
      }
    }, 10000);
  </script>
</body>
</html>
