<script>
  // URL của Cloudflare Worker (đã gán tên miền hoặc link .workers.dev)
  const API_URL = 'https://api.xabacha.com'; 

  async function submitForm(data) {
    // Hiển thị loading (nếu bạn có spinner)
    document.getElementById('loading').style.display = 'flex';

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain' // Để tránh các kiểm tra CORS phức tạp
        },
        body: JSON.stringify({
          action: 'addVanBanWithAuth', // Tên case trong Code.gs chính của bạn
          params: data,
          token: 'YOUR_SECRET_TOKEN' // Nếu bạn có thiết lập bảo mật
        })
      });

      const result = await response.json();

      if (result.success) {
        alert('Gửi dữ liệu thành công!');
        // Code để reset form hoặc đóng modal...
      } else {
        alert('Lỗi: ' + (result.error || 'Không xác định'));
      }
    } catch (error) {
      console.error('Lỗi kết nối:', error);
      alert('Lỗi kết nối đến hệ thống. Vui lòng kiểm tra lại mạng.');
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }
</script>
