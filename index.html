<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbx9W_z8IHFo18JrtMwXPtP5Hgph43BFT2mlLXoKzEB6EdHlbos7s9fEwNJRypfXtvcj0Q/exec';

function enterSystem(e){
  e.preventDefault();

  // Kiểm tra URL có tồn tại không
  if(!GAS_URL){
    document.getElementById('errDiv').style.display = 'block';
    return;
  }

  var btn = document.getElementById('mainBtn');
  btn.style.opacity = '.5';
  btn.style.pointerEvents = 'none';

  document.getElementById('loadingDiv').style.display = 'flex';

  // Chuyển hướng sang Apps Script
  window.location.href = GAS_URL;
}
</script>
